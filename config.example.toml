listen = "127.0.0.1:8080"
channel_capacity = 4096
sources_file = "sources.toml"

# Path to the status page HTML, resolved relative to this config file.
# Reloaded from disk on /admin/reload and SIGHUP, no rebuild required.
static_file = "static/index.html"

# Public host:port shown in the status page's example curl/wscat commands.
# Leave empty to show a generic "host" placeholder instead.
hostname = "localhost:8080"

# Reconnect backoff for upstream analyzers.
reconnect_initial_delay_secs = 1
reconnect_max_delay_secs = 30
# After an analyzer has been offline continuously for this long, use the longer delay below.
reconnect_offline_threshold_secs = 60
reconnect_offline_delay_secs = 300

# Content-dedup window for `/ws?dedupByContent` clients. `dedup_window_secs` is
# the default a client gets; `?dedupWindowSecs=` may override it up to
# `dedup_max_window_secs`. Larger windows catch more duplicates but hold more
# hashes per connection in memory. Applied to new connections on reload.
dedup_window_secs = 300
dedup_max_window_secs = 3600

# Bearer token required for /admin/* endpoints. Leave empty or keep the default
# placeholder to disable the admin API.
admin_token = "change-me"

# User-Agent sent on upstream WebSocket handshakes. Leave empty to use the
# library default. Per-source headers in sources.toml can override this.
# user_agent = "Tangleveil/0.1.0"

# Extra telemetry timing logs and debug-level output when true.
# Can also be enabled with --verbose / -v.
verbose = false
